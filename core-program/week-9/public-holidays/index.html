<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Public Holidays</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="loading" id="loading">
      <div class="spinner"></div>
    </div>

    <div class="container">
      <header>
        <h1><span id="country-name"></span> Public Holidays</h1>
      </header>

      <div class="controls">
        <label for="country-select" class="country-label">Country:</label>
        <select id="country-select" class="country-select">
          <!-- Countries will be populated by JavaScript -->
        </select>
        <label for="year-select" class="year-label">Year:</label>
        <select id="year-select" class="year-select">
          <!-- Years will be populated by JavaScript -->
        </select>
      </div>

      <div class="error-message" id="error-message"></div>

      <div id="holidays-container"></div>
    </div>

    <script src="index.js" type="module"></script>
  </body>
</html>
