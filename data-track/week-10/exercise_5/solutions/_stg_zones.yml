version: 2

models:
  - name: stg_zones
    description: One row per TLC taxi zone.
    columns:
      - name: location_id
        description: TLC zone ID (primary key of the zone dimension).
        tests:
          - unique
          - not_null
          # WHY unique + not_null: location_id is the primary key of the zone
          # dimension and the target of the relationships test in _stg_trips.yml.
          # A relationships test is only meaningful if its target is itself a clean,
          # unique, non-null key.

      - name: borough
        description: NYC borough.
