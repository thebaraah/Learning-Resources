version: 2

models:
  - name: stg_trips
    description: Cleaned green taxi trips, one row per trip.
    columns:
      - name: pickup_location_id
        description: TLC zone ID where the trip started (join key into stg_zones).
        tests:
          - not_null
          - relationships:
              to: ref('stg_zones')
              field: location_id
              config:
                severity: warn
          # WHY severity: warn: some trips carry a pickup_location_id with no matching
          # row in raw_zones (the same unmatched trips that show a NULL pickup_borough
          # in fct_trips). This is a real gap in the source data, not a code bug. `warn`
          # surfaces the count on every run without blocking `dbt build`; the default
          # `error` would halt the pipeline over data you cannot fix upstream.

      - name: fare_amount
        description: Total fare in USD.
        tests:
          - not_null

      - name: payment_type
        description: TLC payment code (1-6).
        tests:
          - accepted_values:
              values: [1, 2, 3, 4, 5, 6]
          # WHY accepted_values: payment_type is a controlled vocabulary (six TLC codes).
          # accepted_values fails if an unexpected code appears, catching upstream data
          # drift that a not_null test would miss.
